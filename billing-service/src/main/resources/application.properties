# =============================================
# Application
# =============================================
quarkus.application.name=billing-service
quarkus.http.port=8082
quarkus.http.host=0.0.0.0

# =============================================
# DataSource (PostgreSQL)
# =============================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres

# --- Mode DEV (mvn quarkus:dev) → localhost ---
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5434/billingdb

# --- Mode PROD (Docker) → nom du conteneur Docker ---
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres-billing:5432/billingdb

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# =============================================
# Service Discovery (via Stork + Consul)
# =============================================
# 1. Enregistrement du billing-service dans Consul
quarkus.stork.billing-service.service-registrar.type=consul
%dev.quarkus.stork.billing-service.service-registrar.consul-host=localhost
%prod.quarkus.stork.billing-service.service-registrar.consul-host=consul
quarkus.stork.billing-service.service-registrar.consul-port=8500

# 2. Découverte du customer-service via Consul
quarkus.stork.customer-service.service-discovery.type=consul
%dev.quarkus.stork.customer-service.service-discovery.consul-host=localhost
%prod.quarkus.stork.customer-service.service-discovery.consul-host=consul
quarkus.stork.customer-service.service-discovery.consul-port=8500
quarkus.stork.customer-service.service-registrar.enabled=false

# =============================================
# REST Clients
# =============================================
quarkus.rest-client.CUSTOMER-SERVICE.url=stork://customer-service

# Activer Swagger UI même en PROD (Docker)
quarkus.swagger-ui.always-include=true