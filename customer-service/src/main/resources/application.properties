# =============================================
# Application
# =============================================
quarkus.application.name=customer-service
quarkus.http.port=8081
quarkus.http.host=0.0.0.0

# =============================================
# DataSource (PostgreSQL)
# =============================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/customerdb

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# =============================================
# Eureka Service Discovery (via Stork)
# =============================================
# Enregistrement de CE service dans Consul via Stork
quarkus.stork.customer-service.service-registrar.type=consul
quarkus.stork.customer-service.service-registrar.consul-host=localhost
quarkus.stork.customer-service.service-registrar.consul-port=8500

